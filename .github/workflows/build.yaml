name: build

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - ".gitignore"
      - "**.md"

  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug

jobs:
  build_ohos:
    name: Build for ohos
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions: write-all
    steps:

      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup HarmonyOS CLI tools
        uses: ErBWs/setup-ohos@v1
        with:
          version: latest
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl libgl1-mesa-dev
        shell: bash

      - name: Verify hvigorw
        run: hvigorw -v

      - name: Install project dependencies
        run: |
          ohpm install --all --rt 5 --ri 5000

      - name: Build hap
        run: hvigorw clean assembleHap -p buildMode=release --config properties.ignoreSignHap=true
        shell: bash

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '"versionName"' AppScope/app.json5 | sed 's/.*"versionName"[^"]*"\([^"]*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Rename hap
        run: |
          HAP_FILE=$(find "${{ github.workspace }}/entry/build" -name "*.hap" -type f | head -n 1)
          if [ -z "$HAP_FILE" ]; then
            echo "::error::No hap file found in build output!"
            exit 1
          fi
          echo "Found hap: $HAP_FILE"
          cp "$HAP_FILE" "${{ github.workspace }}/ohtotptoken_${{ steps.version.outputs.version }}_unsigned.hap"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ohos_outputs
          path: ${{ github.workspace }}/ohtotptoken_${{ steps.version.outputs.version }}_unsigned.hap
          if-no-files-found: error
          retention-days: 30

      - name: Create Release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: ohtotptoken_${{ steps.version.outputs.version }}_unsigned.hap
          generate_release_notes: true
